<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persol Webstore</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <header
      class="d-flex justify-content-between align-items-center p-3 border-bottom"
    >
      <div class="d-flex align-items-center">
        <a href="#home" class="text-decoration-none"
          ><span class="ms-0 h3 mb-0 fw-bold text-primary" id="site-title"
            >Persol Webstore</span
          ></a
        >
      </div>
      <div id="visitor-counter" class="text-end">
        <span>Lượt truy cập: <b id="counter">0</b></span>
      </div>
    </header>
    <nav
      id="main-menu"
      class="navbar navbar-expand-lg navbar-light bg-light sticky-top"
    >
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="#home" id="menu-home"
                >Trang chủ</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#products" id="menu-products"
                >Sản phẩm</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#cart" id="menu-cart">Giỏ hàng</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#orders" id="menu-orders">Đơn hàng</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact" id="menu-contact">Liên hệ</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="auth-menu">
            <li class="nav-item">
              <a class="nav-link" href="#login" id="menu-login">Đăng nhập</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#register" id="menu-register"
                >Đăng ký</a
              >
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-none" id="user-menu">
            <li class="nav-item">
              <span class="nav-link" id="user-info"></span>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#logout" id="menu-logout">Đăng xuất</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main id="spa-content" class="container my-4">
      <!-- Nội dung động sẽ được JS render tại đây -->
    </main>
    <footer class="footer bg-dark text-light py-2 fixed-bottom">
      <div class="container d-flex justify-content-between align-items-center">
        <span id="ticker"></span>
        <span id="location"></span>
      </div>
    </footer>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/product.js"></script>
    <script src="assets/js/filter.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/order.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/contact.js"></script>
  </body>
</html>
